services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: afkvision
      POSTGRES_USER: afkvision
      POSTGRES_PASSWORD: afkvision
    ports:
      - "5434:5432"
    volumes:
      - afkvision_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"

  inference:
    build:
      context: ./infra/local_inference
    restart: unless-stopped
    environment:
      AFKVISION_DETECTOR_MODEL: ${AFKVISION_DETECTOR_MODEL:-yolov8n.pt}
      AFKVISION_DETECTOR_MODEL_REPO: ${AFKVISION_DETECTOR_MODEL_REPO:-NvMayMay/weedblaster-vision-yolov8s}
      AFKVISION_DETECTOR_MODEL_FILE: ${AFKVISION_DETECTOR_MODEL_FILE:-best.pt}
      AFKVISION_DETECTOR_CONFIDENCE: ${AFKVISION_DETECTOR_CONFIDENCE:-0.2}
      AFKVISION_DETECTOR_IMAGE_SIZE: ${AFKVISION_DETECTOR_IMAGE_SIZE:-1024}
      AFKVISION_EMBEDDING_MODEL: ${AFKVISION_EMBEDDING_MODEL:-openai/clip-vit-base-patch32}
      AFKVISION_CLASS_SCHEMA: ${AFKVISION_CLASS_SCHEMA:-cropandweed_9}
      AFKVISION_SCHEMA_LABELS: ${AFKVISION_SCHEMA_LABELS:-maize,sugar_beet,soy,sunflower,potato,pea,bean,pumpkin,weed}
      AFKVISION_ALLOWED_LABELS: ${AFKVISION_ALLOWED_LABELS:-}
      AFKVISION_LABEL_ALIASES_JSON: ${AFKVISION_LABEL_ALIASES_JSON:-}
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      ULTRALYTICS_HOME: /models/ultralytics
      OMP_NUM_THREADS: ${AFKVISION_INFERENCE_THREADS:-4}
    ports:
      - "8091:8091"
    volumes:
      - afkvision_hf:/models/huggingface
      - afkvision_ultralytics:/models/ultralytics
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8091/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - afkvision_ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      AFKVISION_OLLAMA_MODEL: ${AFKVISION_OLLAMA_MODEL:-moondream}
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        until ollama list >/dev/null 2>&1; do sleep 2; done;
        ollama pull "${AFKVISION_OLLAMA_MODEL:-moondream}"
    restart: "no"

volumes:
  afkvision_pg:
  afkvision_hf:
  afkvision_ultralytics:
  afkvision_ollama:
